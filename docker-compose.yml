version: "3.8"

services:
  # PostgreSQL数据库（主数据库）
  postgres:
    image: postgres:15-alpine
    container_name: employee-monitor-db
    environment:
      POSTGRES_DB: employeemonitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Admin@123456}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d employeemonitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-network

  # 备用数据库（可选）
  postgres_backup:
    image: postgres:15-alpine
    container_name: employee-monitor-db-backup
    environment:
      POSTGRES_DB: employeemonitor_backup
      POSTGRES_USER: backup_user
      POSTGRES_PASSWORD: ${BACKUP_DB_PASSWORD:-Backup@123456}
    volumes:
      - postgres_backup_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    profiles:
      - backup
    networks:
      - monitor-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: employee-monitor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-network

  # FastAPI服务器
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: employee-monitor-server
    environment:
      - DATABASE_URL=postgresql://admin:${DB_PASSWORD:-Admin@123456}@postgres:5432/employeemonitor
      - BACKUP_DATABASE_URL=postgresql://backup_user:${BACKUP_DB_PASSWORD:-Backup@123456}@postgres_backup:5432/employeemonitor_backup
      - USE_BACKUP_DB=false
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123456}
      - SCREENSHOT_DIR=/data/screenshots
      - SCREENSHOT_FORMAT=webp
      - SCREENSHOT_QUALITY=80
      - AUTO_CLEANUP_ENABLED=true
      - CLEANUP_INTERVAL=21600
      - SCREENSHOT_RETENTION_HOURS=4
      - DEBUG=false
    volumes:
      - screenshots_data:/data/screenshots
      - logs_data:/data/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitor-network

  # 后台管理（Vue）
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: employee-monitor-admin
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - monitor-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: employee-monitor-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - screenshots_data:/data/screenshots:ro
    ports:
      - "443:443"
    depends_on:
      - server
      - admin
    restart: unless-stopped
    networks:
      - monitor-network
    profiles:
      - production

  # 定时备份任务
  backup:
    image: postgres:15-alpine
    container_name: employee-monitor-backup
    environment:
      - PGUSER=admin
      - PGPASSWORD=${DB_PASSWORD:-Admin@123456}
      - PGHOST=postgres
      - PGDATABASE=employeemonitor
      - BACKUP_DIR=/backups
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh:ro
    entrypoint: |
      sh -c "
      apk add --no-cache dcron
      chmod +x /backup.sh
      echo '0 */6 * * * /backup.sh' > /var/spool/cron/crontabs/root
      crond -f
      "
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - monitor-network
    profiles:
      - backup

networks:
  monitor-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  postgres_backup_data:
    driver: local
  redis_data:
    driver: local
  screenshots_data:
    driver: local
  logs_data:
    driver: local
